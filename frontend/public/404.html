<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>KIRATECH</title>
  <script>
    // Redirect 404s back to index.html, preserving the path for React Router
    var path = window.location.pathname + window.location.search;
    sessionStorage.setItem('redirect', path);
    window.location.replace('/');
  </script>
</head>
<body></body>
</html>
